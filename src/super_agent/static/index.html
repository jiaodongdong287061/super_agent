<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Agent - 企业级 AI 知识库</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f0f2f5; color: #1a1a2e; height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Login Page ── */
  .login-page {
    display: flex; align-items: center; justify-content: center; height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .login-card {
    background: #fff; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15); width: 360px;
  }
  .login-card h1 { font-size: 24px; margin-bottom: 8px; }
  .login-card p { color: #666; margin-bottom: 32px; font-size: 14px; }
  .login-card .logo { font-size: 48px; margin-bottom: 16px; }
  .btn-login {
    display: inline-block; background: #667eea; color: #fff; border: none;
    padding: 12px 40px; border-radius: 8px; font-size: 16px; cursor: pointer;
    text-decoration: none; transition: background .2s;
  }
  .btn-login:hover { background: #5a6fd6; }

  /* ── Chat Layout ── */
  .chat-page { display: none; flex-direction: column; height: 100vh; }
  .chat-page.active { display: flex; }

  /* ── Header ── */
  .header {
    background: #fff; padding: 12px 24px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid #e8e8e8; flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-left h1 { font-size: 18px; font-weight: 600; }
  .header-left .badge { background: #667eea; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #666; }
  .btn-logout {
    background: none; border: 1px solid #ddd; padding: 6px 16px; border-radius: 6px;
    font-size: 13px; cursor: pointer; color: #666; transition: all .2s;
  }
  .btn-logout:hover { border-color: #ff4d4f; color: #ff4d4f; }

  /* ── Messages ── */
  .messages {
    flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px;
  }
  .messages:empty::after {
    content: "输入问题开始使用知识库"; display: block; text-align: center;
    color: #bbb; font-size: 14px; padding: 60px 0; user-select: none;
  }
  .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; word-wrap: break-word; }
  .message.user { background: #667eea; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .message.assistant { background: #fff; color: #1a1a2e; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .message.assistant .stream-cursor::after { content: "▌"; animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .message .timestamp { font-size: 11px; color: #999; margin-top: 4px; }

  /* ── Citations ── */
  .citations { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
  .citations summary { font-size: 12px; color: #667eea; cursor: pointer; font-weight: 500; }
  .citations-list { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .citation-item { font-size: 12px; color: #666; padding: 4px 8px; background: #f8f9ff; border-radius: 4px; }
  .citation-item .src { color: #333; font-weight: 500; }
  .citation-item .snippet { color: #888; display: block; margin-top: 2px; }

  /* ── Suggestion Chips ── */
  .suggestions { display: flex; gap: 8px; padding: 0 24px 12px; flex-wrap: wrap; flex-shrink: 0; }
  .suggestion-chip {
    background: #fff; border: 1px solid #e8e8e8; padding: 6px 16px; border-radius: 20px;
    font-size: 13px; cursor: pointer; color: #555; transition: all .2s; white-space: nowrap;
  }
  .suggestion-chip:hover { border-color: #667eea; color: #667eea; background: #f8f9ff; }

  /* ── Input ── */
  .input-area { flex-shrink: 0; padding: 12px 24px 20px; background: #f0f2f5; }
  .input-wrapper {
    display: flex; gap: 8px; background: #fff; border: 1px solid #e8e8e8;
    border-radius: 12px; padding: 8px 12px; align-items: flex-end; transition: border-color .2s;
  }
  .input-wrapper:focus-within { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
  .input-wrapper textarea {
    flex: 1; border: none; outline: none; font-size: 14px; font-family: inherit;
    resize: none; max-height: 120px; line-height: 1.5; padding: 4px 0;
  }
  .btn-send {
    background: #667eea; color: #fff; border: none; width: 36px; height: 36px;
    border-radius: 8px; cursor: pointer; font-size: 18px; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s;
  }
  .btn-send:hover { background: #5a6fd6; }
  .btn-send:disabled { background: #ccc; cursor: not-allowed; }
  .btn-send svg { width: 18px; height: 18px; fill: currentColor; }

  /* ── Error ── */
  .error-msg { color: #ff4d4f; background: #fff2f0; padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-top: 4px; }

  /* ── Scrollbar ── */
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  .messages::-webkit-scrollbar-thumb:hover { background: #bbb; }
</style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="logo">🧠</div>
    <h1>Super Agent</h1>
    <p>企业级 AI 知识库，请登录后使用</p>
    <a class="btn-login" href="/auth/login">登录 / 注册</a>
  </div>
</div>

<div class="chat-page" id="chatPage">
  <div class="header">
    <div class="header-left">
      <h1>Super Agent</h1>
      <span class="badge">知识库</span>
    </div>
    <div class="header-right">
      <span id="userDisplay"></span>
      <button class="btn-logout" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <span class="suggestion-chip">告警频率多少算异常</span>
    <span class="suggestion-chip">如何查看历史告警</span>
    <span class="suggestion-chip">告警自动恢复机制</span>
    <span class="suggestion-chip">网络故障排查步骤</span>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="输入你的问题..." onkeydown="onKeyDown(event)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const STATE = { userId: '', username: '', loading: false };

const SUGGESTIONS = [
  '告警频率多少算异常',
  '如何查看历史告警',
  '告警自动恢复机制',
  '网络故障排查步骤',
];

// ── Init ──
(async () => {
  try {
    const res = await fetch('/auth/me');
    if (!res.ok) throw new Error('not logged in');
    const user = await res.json();
    STATE.userId = user.user_id;
    STATE.username = user.display_name || user.username;
    showChat();
  } catch {
    showLogin();
  }
})();

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('chatPage').classList.remove('active');
}

function showChat() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('chatPage').classList.add('active');
  document.getElementById('userDisplay').textContent = STATE.username || STATE.userId;
}

function logout() {
  window.location.href = '/auth/logout';
}

// ── Send Message ──
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const messages = document.getElementById('messages');
const suggestions = document.getElementById('suggestions');

input.addEventListener('input', () => {
  sendBtn.disabled = !input.value.trim() || STATE.loading;
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || STATE.loading) return;

  STATE.loading = true;
  sendBtn.disabled = true;
  suggestions.style.display = 'none';

  // User message
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  // Assistant message placeholder
  const assistantDiv = addMessage('assistant', '');
  const contentDiv = assistantDiv.querySelector('.content');
  contentDiv.classList.add('stream-cursor');

  try {
    const res = await fetch('/rag/query/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text, top_k: 5 }),
    });

    if (!res.ok) {
      const err = await res.text();
      contentDiv.textContent = `请求失败 (${res.status})`;
      contentDiv.classList.remove('stream-cursor');
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    const buffer = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer.push(decoder.decode(value, { stream: true }));
      const full = buffer.join('');
      const events = full.split('\n\n').filter(Boolean);

      for (const event of events) {
        if (!event.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(event.slice(6));
          switch (data.type) {
            case 'token':
              contentDiv.textContent += data.text;
              messages.scrollTop = messages.scrollHeight;
              break;
            case 'sources':
              // Sources received, but not displayed inline
              break;
            case 'citations':
              contentDiv.classList.remove('stream-cursor');
              if (data.citations && data.citations.length) {
                renderCitations(assistantDiv, data.citations);
              }
              break;
            case 'done':
              contentDiv.classList.remove('stream-cursor');
              break;
            case 'error':
              contentDiv.textContent = '出错了: ' + data.message;
              contentDiv.classList.remove('stream-cursor');
              break;
          }
        } catch { /* skip partial JSON */ }
      }
    }
    contentDiv.classList.remove('stream-cursor');
  } catch (err) {
    contentDiv.textContent = '网络错误: ' + err.message;
    contentDiv.classList.remove('stream-cursor');
  } finally {
    STATE.loading = false;
    sendBtn.disabled = !input.value.trim();
    messages.scrollTop = messages.scrollHeight;
  }
}

// ── UI Helpers ──
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (role === 'assistant') {
    div.innerHTML = `<div class="content"></div>`;
    // Set text directly
    const contentDiv = div.querySelector('.content');
    // Handle if text provided directly (non-streaming case)
    if (text) contentDiv.textContent = text;
  } else {
    div.innerHTML = `<div class="content">${escapeHtml(text)}</div>`;
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = new Date().toLocaleTimeString();
    div.appendChild(ts);
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function renderCitations(assistantDiv, citations) {
  const existing = assistantDiv.querySelector('.citations');
  if (existing) existing.remove();

  const details = document.createElement('details');
  details.className = 'citations';
  details.open = true;
  const summary = document.createElement('summary');
  summary.textContent = `📎 ${citations.length} 个来源`;
  details.appendChild(summary);

  const list = document.createElement('div');
  list.className = 'citations-list';
  for (const c of citations) {
    const item = document.createElement('div');
    item.className = 'citation-item';
    const pages = c.page_numbers && c.page_numbers.length ? ` · 第 ${c.page_numbers.join(', ')} 页` : '';
    item.innerHTML = `<span class="src">${escapeHtml(c.source_doc)}</span>${pages}<span class="snippet">${escapeHtml(c.content_snippet)}</span>`;
    list.appendChild(item);
  }
  details.appendChild(list);
  assistantDiv.appendChild(details);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Suggestion Chips ──
document.querySelectorAll('.suggestion-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    input.value = chip.textContent;
    sendBtn.disabled = false;
    input.focus();
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
});
</script>
</body>
</html>
